<!doctype html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="version" content="1.0.0">
  <script
    src="https://cdn.front.nu/nightly/front.js"
    module="globalize;data;navigate;keyboard;screen"
    plugin="syntaxhighlighting;clipboard"
    var="api"
    conf="debug:false;debugLocalhost:true;varsDir:assets/json/vars;storageKey:code;frontSrcLocal:http://localhost/front/front.js"
    globalize-conf="folder:assets/json/locales"
    syntaxhighlighting-conf=""
    navigate-conf="startpage:experimental/app/code;startpageLocal:app/code">
  </script>
  <link type="text/css" href="https://cdn.front.nu/dist/front.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css"> <!-- Will be removed in future. -->
  <link rel="stylesheet" href="https://cdn.front.nu/dist/design/front/theme/front.css"> <!-- Will be removed in future. -->
  <title>Playground</title>
</head>

<body class="light">
  <div id="navloader" class="navloader pa t0 w100 bcblack03 h2px" hide>
    <div class="bcblack08"></div>
  </div>
  <header class="topbar h4 pr1 bcblack white- white shade1">
    <ul flex flexdirection="column" id="menu" hide bgcolor="white" color="black" boxshadow="0 2px 8px rgba(0,0,0,0.2)" padding="0.5rem 0"
      radius="4px" absolute zindex="9999" top="100px">
      <li click="syntaxhighlighting--format:#code;hide:#menu" padding="0.5rem 1rem" mouseover="bgcolor:[#f0f0f0]"
        mouseout="bgcolor:[inherit]" cursor="pointer" color="black">Format Code</li>
      <li click="clipboard--copy:#code;hide:#menu" padding="0.5rem 1rem" mouseover="bgcolor:[#f0f0f0]"
        mouseout="bgcolor:[inherit]" cursor="pointer" color="black">Copy</li>
    </ul>

    <button click="toggle" clicktargetfield="aside[0]" class="ml1 dark p05 br50 hover-"><i class="icon24">≡</i></button>
    <a class="ml1 mr1" href="./" globalize-get="code" uppercase bold>Code</a>
    <button click="sethtml:#preview:#code" class="mr05 fr dark p05 br50 hover-"><i class="icon16">&#9658;</i></button>
  </header>

  <aside resize="horizontal" width="50vw">
    <code
      rightclick="show:#menu"
      id="code"
      class="markup lavender br0 mt0 mh100"
      name="note"
      bindasset="apikey:api.api_key;url:api.notes.url"
      bindquery="id:id;slug:slug"
      onvaluechange="data-reqpatch"
      data-src="{url}?or=(id.eq.{id:1},slug.eq.{slug})"
      data-get="0.note"
      data-ongetload="sethtml:#preview:#code"
      data-onfinish="syntaxhighlighting--set:#code"
      data-onsuccess="sethtml:#preview:#code"
      data-header="apikey:{apikey}"
      data-reqpatch="{url}?id=eq.{id:1}&limit=1&order=id"
      data-enctype="application/json"
      whitespace="pre"
      contenteditable="plaintext-only"
      spellcheck="false"
      keyboard-translate="Tab:  "
      disable-keyboard-untranslate="Backspace:  "
      font="monospace">
    </code>
  </aside>
  <main width="100%">
    <iframe
      id="preview"
      src="includes/preview.html"
      height="100%"
      bgcolor="white"
      border="0">
    </iframe>
  </main>
</body>

</html>
